# Local data-plane emulators. These stand in for the real GCP services so we can
# run the pipeline end-to-end with no cloud account.
#
# Reminder: emulators do NOT implement the control plane the way Terraform needs,
# so we create topics/subscriptions/buckets here with app/bootstrap.py instead.
services:
  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=darkwolf-practice-dev
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20

  gcs:
    image: fsouza/fake-gcs-server:latest
    command: >
      -scheme http
      -host 0.0.0.0
      -port 4443
      -public-host localhost:4443
    ports:
      - "4443:4443"
